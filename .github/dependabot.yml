version: 2

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  # Note: LuaRocks is not natively supported by Dependabot.
  # To track Lua dependency updates, consider one of:
  #   - Pinning versions in your Makefile/setup targets and reviewing manually
  #   - Using Renovate (https://docs.renovatebot.com/) which has broader ecosystem support
  #   - Vendoring dependencies and tracking them via a custom update script
