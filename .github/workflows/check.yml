name: Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.4
          sudo luarocks install luacheck
          sudo luarocks install busted

      - name: Lint
        run: make check

      - name: Test
        run: make test
